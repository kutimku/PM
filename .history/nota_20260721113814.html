<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPM</title>

    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #e6f2ff;
        margin: 0;
        padding: 15px;
        padding-bottom: 80px;
        line-height: 1.5;
      }

      .container {
        max-width: 500px;
        margin: auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }

      h2,
      h3 {
        text-align: center;
        margin-top: 0;
        color: #2c3e50;
      }

      input,
      button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        margin-top: 10px;
        box-sizing: border-box;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
      }

      input:focus {
        border-color: #3498db;
        box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
      }

      button {
        background-color: #3498db;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s;
      }

      button:hover {
        background-color: #2980b9;
      }
      button:active {
        transform: scale(0.98);
      }

      hr {
        margin: 25px 0;
        border: 0;
        border-top: 1px solid #eee;
      }

      .card {
        background: #fdfdfd;
        padding: 15px;
        border: 1px solid #f0f0f0;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
        margin-top: 8px;
      }

      th,
      td {
        border: 1px solid #eee;
        padding: 10px;
        text-align: left;
        word-break: break-word;
      }

      th {
        background: #f8f9fa;
        color: #333;
      }

      #loading {
        display: none;
        text-align: center;
        margin-top: 15px;
      }

      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 35px;
        height: 35px;
        animation: spin 1s linear infinite;
        margin: auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      #error {
        color: #e74c3c;
        margin-top: 10px;
        text-align: center;
        font-weight: bold;
      }

      .lunas {
        color: #27ae60;
        font-weight: bold;
      }
      .belum {
        color: #e74c3c;
        font-weight: bold;
      }

      /* Header screenshot — judul + kode konsumen */
      #screenshot-header {
        display: none;
        text-align: center;
        padding: 15px 0 5px;
        border-bottom: 2px solid #2c3e50;
        margin-bottom: 10px;
      }

      #screenshot-header h2 {
        margin: 0 0 4px;
        font-size: 18px;
        color: #2c3e50;
      }

      #screenshot-header p {
        margin: 0;
        font-size: 13px;
        color: #666;
      }

      /* Tombol Simpan */
      #btnSimpanWrapper {
        display: none;
        margin-top: 20px;
      }

      #btnSimpan {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border: none;
        padding: 13px;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        letter-spacing: 0.5px;
      }

      #btnSimpan:hover {
        background: linear-gradient(135deg, #059669 0%, #047857 100%);
      }
      #btnSimpan:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
          padding-bottom: 100px;
        }
        .container {
          padding: 15px;
        }
        h2 {
          font-size: 20px;
        }
        h3 {
          font-size: 18px;
        }
        table {
          font-size: 13px;
        }
        input,
        button {
          font-size: 16px;
          padding: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Area screenshot: mencakup judul, kode, dan hasil -->
      <div id="area-screenshot">
        <!-- Header judul selalu tampil di screenshot -->
        <div id="screenshot-header">
          <h2>🏡 Kapling Permata Manshurin</h2>
          <p>Nota Elektronik</p>
          <p
            id="kode-tampil"
            style="font-weight: bold; color: #2c3e50; margin-top: 4px"
          ></p>
        </div>

        <!-- Judul normal (tampil di web, disembunyikan saat screenshot) -->
        <div id="judul-web">
          <h2>Kapling Permata Manshurin</h2>
          <h3>Nota Elektronik</h3>
        </div>

        <input type="text" id="kode" placeholder="Masukkan ID Konsumen" />
        <button onclick="cariData()">Cek Data</button>

        <div id="loading">
          <div class="spinner"></div>
          <p>Memuat data...</p>
        </div>

        <div id="error"></div>

        <div id="hasil" style="display: none">
          <hr />
          <div class="card">
            <p><strong>Nama:</strong> <span id="nama"></span></p>
            <p><strong>Kapling:</strong> <span id="kapling"></span></p>
            <p><strong>Harga:</strong> <span id="harga"></span></p>
            <p><strong>Total Bayar:</strong> <span id="total"></span></p>
            <p><strong>Sisa:</strong> <span id="sisa"></span></p>
            <p><strong>Status:</strong> <span id="status"></span></p>
          </div>

          <h3>Rincian Pembayaran</h3>
          <div style="overflow-x: auto">
            <table>
              <thead>
                <tr>
                  <th>Tanggal</th>
                  <th>Jenis</th>
                  <th>Nominal</th>
                </tr>
              </thead>
              <tbody id="rincian"></tbody>
            </table>
          </div>
        </div>
      </div>
      <!-- akhir area-screenshot -->

      <!-- Tombol simpan — di LUAR area screenshot -->
      <div id="btnSimpanWrapper">
        <button id="btnSimpan" onclick="simpanSebagaiGambar()">
          💾 SIMPAN HASIL
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script>
      function formatRupiah(angka) {
        return "Rp " + Number(angka).toLocaleString("id-ID");
      }

      function formatTanggal(tanggal) {
        if (!tanggal) return "-";
        return new Date(tanggal).toLocaleDateString("id-ID");
      }

      function cariData() {
        var kode = document.getElementById("kode").value.trim();
        var loading = document.getElementById("loading");
        var errorDiv = document.getElementById("error");
        var hasil = document.getElementById("hasil");
        var btnWrapper = document.getElementById("btnSimpanWrapper");

        errorDiv.innerText = "";
        hasil.style.display = "none";
        btnWrapper.style.display = "none";

        if (!kode) {
          errorDiv.innerText = "Masukkan kode konsumen dulu.";
          return;
        }

        loading.style.display = "block";

        var url =
          "https://script.google.com/macros/s/AKfycbzrZaqtOmkfKAtNbew-1f9pypZeyxZy4kRAUotcsWShvyeChDTjpj--B5DNFn2wzC4f/exec?kode=" +
          encodeURIComponent(kode);

        fetch(url)
          .then(function (response) {
            return response.json();
          })
          .then(function (data) {
            loading.style.display = "none";

            if (data.error) {
              errorDiv.innerText = data.error;
              return;
            }

            document.getElementById("nama").innerText = data.nama || "-";
            document.getElementById("kapling").innerText = data.kapling || "-";
            document.getElementById("harga").innerText = formatRupiah(
              data.harga,
            );
            document.getElementById("total").innerText = formatRupiah(
              data.total_bayar,
            );
            document.getElementById("sisa").innerText = formatRupiah(data.sisa);

            var statusEl = document.getElementById("status");
            if (Number(data.sisa) === 0) {
              statusEl.innerText = "LUNAS";
              statusEl.className = "lunas";
            } else {
              statusEl.innerText = "BELUM LUNAS";
              statusEl.className = "belum";
            }

            var rincianHTML = "";
            if (data.rincian_pembayaran && data.rincian_pembayaran.length > 0) {
              data.rincian_pembayaran.forEach(function (item) {
                rincianHTML += `
                  <tr>
                    <td>${formatTanggal(item.tanggal)}</td>
                    <td>${item.jenis || "-"}</td>
                    <td>${formatRupiah(item.nominal)}</td>
                  </tr>`;
              });
            } else {
              rincianHTML = `<tr><td colspan="3">Belum ada pembayaran</td></tr>`;
            }

            document.getElementById("rincian").innerHTML = rincianHTML;

            // Isi kode di header screenshot
            document.getElementById("kode-tampil").innerText =
              "ID Konsumen: " + kode;

            hasil.style.display = "block";
            btnWrapper.style.display = "block";
          })
          .catch(function () {
            loading.style.display = "none";
            errorDiv.innerText = "Terjadi kesalahan koneksi.";
          });
      }

      // ── SIMPAN SEBAGAI GAMBAR ────────────────────────────────
      async function simpanSebagaiGambar() {
        var btnSimpan = document.getElementById("btnSimpan");
        var btnWrapper = document.getElementById("btnSimpanWrapper");
        var area = document.getElementById("area-screenshot");
        var judulWeb = document.getElementById("judul-web");
        var screenshotHeader = document.getElementById("screenshot-header");
        var inputKode = document.getElementById("kode");
        var btnCek = area.querySelector("button:not(#btnSimpan)");

        var originalText = btnSimpan.innerHTML;
        btnSimpan.innerHTML = "⏳ MENYIMPAN...";
        btnSimpan.disabled = true;

        // Sembunyikan elemen yang tidak perlu di gambar
        btnWrapper.style.display = "none";
        judulWeb.style.display = "none";
        inputKode.style.display = "none";
        btnCek.style.display = "none";

        // Tampilkan header screenshot (judul + kode)
        screenshotHeader.style.display = "block";

        try {
          var canvas = await html2canvas(area, {
            scale: 2,
            backgroundColor: "#ffffff",
            logging: false,
            useCORS: true,
          });

          // Kembalikan semua elemen
          btnWrapper.style.display = "block";
          judulWeb.style.display = "block";
          inputKode.style.display = "block";
          btnCek.style.display = "block";
          screenshotHeader.style.display = "none";

          var timestamp = new Date()
            .toISOString()
            .slice(0, 19)
            .replace(/:/g, "-");
          var filename = "nota_kpm_" + timestamp + ".png";

          canvas.toBlob(function (blob) {
            if (!blob) return alert("Gagal membuat gambar, coba lagi.");
            var url = URL.createObjectURL(blob);
            var link = document.createElement("a");
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            setTimeout(function () {
              document.body.removeChild(link);
              URL.revokeObjectURL(url);
            }, 1500);
          }, "image/png");

          btnSimpan.innerHTML = "✅ BERHASIL DISIMPAN!";
          btnSimpan.style.background =
            "linear-gradient(135deg, #059669 0%, #047857 100%)";

          setTimeout(function () {
            btnSimpan.innerHTML = originalText;
            btnSimpan.disabled = false;
            btnSimpan.style.background =
              "linear-gradient(135deg, #10b981 0%, #059669 100%)";
          }, 2500);
        } catch (err) {
          console.error(err);
          // Kembalikan semua elemen jika error
          btnWrapper.style.display = "block";
          judulWeb.style.display = "block";
          inputKode.style.display = "block";
          btnCek.style.display = "block";
          screenshotHeader.style.display = "none";

          btnSimpan.innerHTML = "❌ GAGAL!";
          setTimeout(function () {
            btnSimpan.innerHTML = originalText;
            btnSimpan.disabled = false;
          }, 2000);
          alert("Gagal menyimpan gambar: " + err.message);
        }
      }
    </script>
  </body>
</html>
