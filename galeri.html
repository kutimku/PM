<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f4f4f4;
        margin: 0;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
      }

      .gallery-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        padding: 10px;
      }

      .gallery-item {
        background: white;
        padding: 5px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .gallery-item img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
      }

      .gallery-item img:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <h2>Galeri Dokumentasi</h2>

    <div class="gallery-container">
      <div class="gallery-item">
        <img src="foto1.jpg" alt="Dokumentasi 1" />
      </div>
      <div class="gallery-item">
        <img src="foto2.jpg" alt="Dokumentasi 2" />
      </div>
      <div class="gallery-item">
        <img src="foto3.jpg" alt="Dokumentasi 3" />
      </div>
    </div>
  </body>
</html>
