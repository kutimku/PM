<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeri Dokumentasi</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f4f4f4;
        margin: 0;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
      }

      .gallery-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        padding: 10px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .gallery-item {
        background: white;
        padding: 5px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: transform 0.2s;
      }

      .gallery-item:hover {
        transform: scale(1.02);
      }

      .gallery-item img {
        width: 100%;
        height: auto;
        border-radius: 5px;
        display: block;
      }

      /* Modal / Lightbox - buat tampilan besar saat diklik */
      .modal {
        display: none;
        position: fixed;
        z-index: 999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        cursor: pointer;
      }

      .modal-content {
        margin: auto;
        display: block;
        max-width: 90%;
        max-height: 90%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .close {
        position: absolute;
        top: 20px;
        right: 35px;
        color: white;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
        z-index: 1000;
      }

      .close:hover {
        color: #ccc;
      }

      @media (max-width: 600px) {
        .gallery-container {
          grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
          gap: 10px;
        }
        .close {
          top: 10px;
          right: 20px;
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <h2>Galeri Dokumentasi</h2>

    <div class="gallery-container">
      <div class="gallery-item">
        <img src="kpm1.jpg" alt="Gambar KPM 1" onclick="openModal(this.src)" />
      </div>
      <div class="gallery-item">
        <img src="kpm2.jpg" alt="Gambar KPM 2" onclick="openModal(this.src)" />
      </div>
      </div>

    <!-- Modal buat tampilan besar -->
    <div id="imageModal" class="modal" onclick="closeModal()">
      <span class="close">&times;</span>
      <img class="modal-content" id="modalImage" />
    </div>

    <script>
      function openModal(imgSrc) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");
        modal.style.display = "block";
        modalImg.src = imgSrc;
      }

      function closeModal() {
        const modal = document.getElementById("imageModal");
        modal.style.display = "none";
      }
    </script>
  </body>
</html>
