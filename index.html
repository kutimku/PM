<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nota Kapling Permata Manshurin</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        overflow: hidden;
      }

      /* Navbar Simple */
      .navbar {
        display: flex;
        background: #2c3e50;
        padding: 10px;
        gap: 10px;
        justify-content: center;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .navbar button {
        padding: 10px 20px;
        cursor: pointer;
        border: none;
        background: #34495e;
        color: white;
        border-radius: 5px;
        transition: 0.3s;
      }

      .navbar button:hover {
        background: #1abc9c;
      }
      .navbar button.active {
        background: #1abc9c;
        font-weight: bold;
      }

      /* Wadah Konten (Iframe) */
      #content-frame {
        width: 100%;
        height: calc(100vh - 60px); /* Kurangi tinggi navbar */
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <button onclick="loadPage('nota.html', this)" class="active">
        Nota PM
      </button>
      <button onclick="loadPage('siteplan.html', this)">KPM-1</button>
      <button onclick="loadPage('siteplan2.html', this)">KPM-2</button>
      <button onclick="loadPage('galeri.html', this)">Galeri</button>
    </div>
    <iframe id="content-frame" src="nota.html"></iframe>

    <script>
      function loadPage(pageUrl, btn) {
        // Ambil elemen iframe
        const frame = document.getElementById('content-frame');
        
        // Gunakan contentWindow.location.replace agar tidak menumpuk di History
        frame.contentWindow.location.replace(pageUrl);

        // Update status tombol aktif
        const buttons = document.querySelectorAll('.navbar button');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    </script>
  </body>
</html>
